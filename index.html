<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просмотр страниц</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toolbar">
    <button id="btnPrev" disabled>← Назад</button>
    <span id="pageIndicator">Загрузка…</span>
    <button id="btnNext">Вперёд →</button>
    <input type="number" id="pageInput" min="1" max="1" value="1" style="width:60px">
    <button id="btnGo">Перейти</button>
    <button id="btnLangRu">RU</button>
    <button id="btnLangEn">EN</button>
  </div>
  <div id="page-container"></div>
  <script src="js/renderer.js"></script>
</body>
</html>
