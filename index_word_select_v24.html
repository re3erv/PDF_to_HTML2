<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>PDF selectable word boxes v24</title>
  <link rel="stylesheet" href="css/style_word_select_v24.css">
</head>
<body>
  <div id="toolbar">
    <button id="btnPrev">←</button>
    <span id="pageIndicator">Страница 1</span>
    <button id="btnNext">→</button>
    <input id="pageInput" type="number" min="1" value="1">
    <button id="btnGo">Перейти</button>
    <button id="btnFit">По ширине</button>
    <button id="btnMinus">−</button>
    <span id="zoomLabel">fit</span>
    <button id="btnPlus">+</button>
    <label><input id="toggleBoxes" type="checkbox" checked> Word boxes</label>
    <label><input id="toggleAnalysis" type="checkbox" checked> Области и линии</label>
    <button id="btnLangEn" class="language active" type="button">En</button>
    <button id="btnLangRu" class="language" type="button">Ru</button>
    <label>Скорость <select id="speechRate"><option>1</option><option>1.25</option><option selected>1.5</option><option>1.75</option><option>2</option></select></label>
    <button id="btnRead" type="button">▶ Читать</button>
    <button id="btnClearSelection">Снять выделение</button>
    <span id="selectionInfo" class="hint">v24: visualIndex = строки сверху вниз, слова слева направо</span>
  </div>
  <div id="page-container"></div>
  <script src="js/renderer_word_select_v24.js"></script>
</body>
</html>
